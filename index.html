<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Beauty Concierge</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="page-shell">
      <aside class="chat-sidebar" id="chatSidebar">
        <div class="sidebar-top">
          <button
            class="new-chat-btn"
            id="newChatBtn"
            title="Start new chat"
            aria-label="Start new chat"
          >
            <span class="new-chat-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path d="M4 20h4l10-10-4-4L4 16v4z"></path>
                <path d="M12 8l4 4"></path>
              </svg>
            </span>
            <span class="new-chat-label">New Chat</span>
          </button>

          <p class="sidebar-label">Chat history</p>
        </div>

        <div class="chat-history-list" id="chatHistoryList"></div>

        <div class="sidebar-footer">
          <button
            class="sidebar-toggle"
            id="sidebarToggle"
            title="Toggle sidebar"
          >
            <span class="sidebar-toggle-label">Hide archive</span>
            <span class="sidebar-toggle-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <rect x="5" y="5" width="14" height="14" rx="5"></rect>
                <path d="M11 8l4 4-4 4"></path>
                <path d="M8 12h6"></path>
              </svg>
            </span>
          </button>
        </div>
      </aside>

      <div class="main-content">
        <header class="simple-header">
          <div class="simple-header-brand">
            <img
              src="img/loreal-logo.png"
              alt="L'Oréal Paris logo"
              class="simple-logo"
              onerror="this.style.display = 'none'"
            />
            <div class="simple-title-row">
              <h1 class="simple-title">L’Oréal Beauty Concierge</h1>
              <button
                type="button"
                id="mobileMenuBtn"
                class="mobile-menu-btn"
                aria-label="Menu"
                title="Menu"
                aria-expanded="false"
                aria-controls="mobileHistoryModal"
              >
                <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                  <path d="M4 7h16"></path>
                  <path d="M4 12h16"></path>
                  <path d="M4 17h16"></path>
                </svg>
              </button>
            </div>
          </div>
        </header>

        <section class="chat-stage" aria-label="L'Oréal chatbot conversation">
          <div id="chatWindow" class="chat-window" aria-live="polite"></div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask about skincare, haircare, makeup, or fragrance"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">Send</button>
          </form>
        </section>
      </div>
    </main>

    <div class="mobile-history-modal" id="mobileHistoryModal" hidden>
      <div class="mobile-history-sheet" role="dialog" aria-modal="true">
        <div class="mobile-history-header">
          <p class="mobile-history-title">Chat history</p>
          <button
            type="button"
            class="mobile-history-close"
            id="mobileHistoryCloseBtn"
            aria-label="Close menu"
          >
            <span aria-hidden="true">✕</span>
          </button>
        </div>

        <button type="button" class="mobile-history-new" id="mobileNewChatBtn">
          New chat
        </button>

        <div
          class="mobile-history-list"
          id="mobileHistoryList"
          aria-label="Mobile chat history"
        ></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
